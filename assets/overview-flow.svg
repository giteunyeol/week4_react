<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="430" rx="24" fill="#F4F8FC"/>
  <text x="60" y="62" fill="#1F2937" font-size="32" font-family="Arial, sans-serif" font-weight="700">Virtual DOM / Diff / Patch Overview</text>
  <text x="60" y="95" fill="#5B6675" font-size="18" font-family="Arial, sans-serif">The whole demo flow from actual DOM to history update</text>

  <rect x="60" y="145" width="220" height="170" rx="18" fill="#FFFFFF" stroke="#CFE0F2" stroke-width="2"/>
  <text x="88" y="192" fill="#2B6CB0" font-size="20" font-family="Arial, sans-serif" font-weight="700">1. Actual DOM</text>
  <text x="88" y="228" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">Sample HTML already</text>
  <text x="88" y="252" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">exists in the left panel.</text>
  <text x="88" y="286" fill="#5B6675" font-size="15" font-family="Arial, sans-serif">domToVNode()</text>

  <rect x="340" y="145" width="220" height="170" rx="18" fill="#FFFFFF" stroke="#CFE0F2" stroke-width="2"/>
  <text x="368" y="192" fill="#2B6CB0" font-size="20" font-family="Arial, sans-serif" font-weight="700">2. Virtual DOM</text>
  <text x="368" y="228" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">Store tag, props,</text>
  <text x="368" y="252" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">children as objects.</text>
  <text x="368" y="286" fill="#5B6675" font-size="15" font-family="Arial, sans-serif">renderVNode()</text>

  <rect x="620" y="145" width="220" height="170" rx="18" fill="#FFFFFF" stroke="#CFE0F2" stroke-width="2"/>
  <text x="648" y="192" fill="#2B6CB0" font-size="20" font-family="Arial, sans-serif" font-weight="700">3. Test Area</text>
  <text x="648" y="228" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">Edit HTML source</text>
  <text x="648" y="252" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">and preview it live.</text>
  <text x="648" y="286" fill="#5B6675" font-size="15" font-family="Arial, sans-serif">Patch button</text>

  <rect x="900" y="145" width="240" height="170" rx="18" fill="#FFFFFF" stroke="#CFE0F2" stroke-width="2"/>
  <text x="928" y="192" fill="#2B6CB0" font-size="20" font-family="Arial, sans-serif" font-weight="700">4. Diff + Patch</text>
  <text x="928" y="228" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">Compare old and new</text>
  <text x="928" y="252" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">VNode, then update</text>
  <text x="928" y="276" fill="#1F2937" font-size="16" font-family="Arial, sans-serif">only changed DOM parts.</text>

  <rect x="455" y="340" width="290" height="56" rx="16" fill="#EAF3FB" stroke="#CFE0F2" stroke-width="2"/>
  <text x="485" y="375" fill="#1F2937" font-size="18" font-family="Arial, sans-serif" font-weight="700">5. Save State History for Undo / Redo</text>

  <path d="M280 230H330" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round"/>
  <path d="M560 230H610" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round"/>
  <path d="M840 230H890" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round"/>
  <path d="M1020 315V335H600V338" stroke="#2B6CB0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M330 230L316 222V238L330 230Z" fill="#2B6CB0"/>
  <path d="M610 230L596 222V238L610 230Z" fill="#2B6CB0"/>
  <path d="M890 230L876 222V238L890 230Z" fill="#2B6CB0"/>
  <path d="M600 338L592 324H608L600 338Z" fill="#2B6CB0"/>
</svg>
