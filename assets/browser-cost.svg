<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="420" rx="24" fill="#F7FAFD"/>
  <text x="60" y="62" fill="#1F2937" font-size="32" font-family="Arial, sans-serif" font-weight="700">Why Real DOM Updates Are Expensive</text>
  <text x="60" y="95" fill="#5B6675" font-size="18" font-family="Arial, sans-serif">Reflow recalculates layout. Repaint redraws visuals.</text>

  <rect x="70" y="145" width="480" height="210" rx="20" fill="#FFFFFF" stroke="#D7E0EA" stroke-width="2"/>
  <text x="105" y="194" fill="#B7791F" font-size="28" font-family="Arial, sans-serif" font-weight="700">Reflow</text>
  <text x="105" y="233" fill="#1F2937" font-size="18" font-family="Arial, sans-serif">When size or position changes,</text>
  <text x="105" y="261" fill="#1F2937" font-size="18" font-family="Arial, sans-serif">the browser recalculates layout.</text>
  <rect x="360" y="190" width="120" height="120" rx="16" fill="#FFF5E1" stroke="#E9C46A" stroke-width="2"/>
  <rect x="390" y="220" width="60" height="18" rx="4" fill="#E9C46A"/>
  <rect x="390" y="246" width="40" height="18" rx="4" fill="#E9C46A"/>
  <rect x="105" y="295" width="200" height="26" rx="13" fill="#FFF5E1"/>
  <text x="125" y="313" fill="#8A5A12" font-size="15" font-family="Arial, sans-serif">layout / position / size</text>

  <rect x="650" y="145" width="480" height="210" rx="20" fill="#FFFFFF" stroke="#D7E0EA" stroke-width="2"/>
  <text x="685" y="194" fill="#2B6CB0" font-size="28" font-family="Arial, sans-serif" font-weight="700">Repaint</text>
  <text x="685" y="233" fill="#1F2937" font-size="18" font-family="Arial, sans-serif">When only color or style changes,</text>
  <text x="685" y="261" fill="#1F2937" font-size="18" font-family="Arial, sans-serif">the browser redraws pixels.</text>
  <rect x="940" y="190" width="120" height="120" rx="16" fill="#E8F2FC" stroke="#7FB3E8" stroke-width="2"/>
  <circle cx="1000" cy="250" r="34" fill="#7FB3E8"/>
  <rect x="685" y="295" width="180" height="26" rx="13" fill="#E8F2FC"/>
  <text x="705" y="313" fill="#2B6CB0" font-size="15" font-family="Arial, sans-serif">color / background</text>

  <rect x="390" y="32" width="420" height="44" rx="14" fill="#EAF3FB"/>
  <text x="426" y="60" fill="#1F2937" font-size="18" font-family="Arial, sans-serif" font-weight="700">Virtual DOM reduces direct DOM work to only changed parts</text>
</svg>
